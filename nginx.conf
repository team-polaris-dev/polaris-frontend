server {
  listen 80;
  server_name _;

  # SPA 라우팅 (새로고침 시 index.html)
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }

  # API 프록시 → 호스트의 백엔드(systemd, :16001)
  location /api/ {
    proxy_pass http://host.docker.internal:16001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
