server {
  listen 80;
  server_name _;

  # SPA 라우팅 (새로고침 시 index.html)
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }

  # API 프록시 → backend 컨테이너
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
